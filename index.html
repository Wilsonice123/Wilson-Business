<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Login</title>
    <style>
        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes inputPulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7);
            }
            50% {
                transform: scale(1.02);
                box-shadow: 0 0 10px 5px rgba(255, 107, 107, 0.3);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 107, 107, 0);
            }
        }

        @keyframes inputGlow {
            0% {
                box-shadow: 0 0 5px 0 rgba(78, 205, 196, 0.5);
            }
            50% {
                box-shadow: 0 0 20px 8px rgba(78, 205, 196, 0.8);
            }
            100% {
                box-shadow: 0 0 5px 0 rgba(78, 205, 196, 0.5);
            }
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(-45deg, #f81616, #4ecdc4, #45b7d1, #f7b731, #fd1d1d);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        div{
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 40px;
            border-radius: 30px;
            color: #fff;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        input{
            padding: 15px;
            border: none;
            outline: none;
            font-size: 15px;
            border-radius: 10px;
            transition: all 0.3s ease;
            background-color: white;
        }

        input:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        input:focus {
            animation: inputGlow 1.5s ease-in-out infinite;
            transform: scale(1.05);
            background-color: #f0f0f0;
        }
        button{
            background-color: deepskyblue;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
        }
        a{
            color: #fff;
            text-decoration: none;
        }
    </style>
</head>
<body>
  <div>
     <form action="login.js" method="post">
        <img src="transferir (1).png" alt="logo" style="display: block; margin: 0 auto; width: 135px; height: 70px;"><br>
       <h4 style="text-align: center; font-family: 'Times New Roman', Times, serif;">Login Wilson Business</h4>
       <input type="text" placeholder="E-mail" id="email"><br><br>
       <input type="password" placeholder="Senha" id="senha"><br><br>
       <button type="button" onclick="login()" id="Button-Usuario">Entrar</button>
       <h6>Lembrar-me<input type="checkbox" onclick="switchTheme()" style="display: inline-block; margin-right: 15px;"><a href="#" class="123" style="margin-left: 10px;">Esqueceu sua senha?</a></h6>
       <button type="button" onclick="window.location.href='cadastro.html'" style="background-color: rgb(58, 248, 74);">Cadastrar</button>
     </form>
 </div>
 <script src="script.js"></script>
</body>
</html>
