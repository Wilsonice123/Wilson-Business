<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <style>
@keyframes gradientShift {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
    100% {
        background-position: 0% 50%;
    }
}

@keyframes float {
    0%, 100% {
        transform: translateY(0px);
    }
    50% {
        transform: translateY(-20px);
    }
}

body{
    background: linear-gradient(-45deg, #200606, #70e622, #2ee7ff, #fc0606, #011311, #09ee28);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    color: white;
    min-height: 100vh;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, geneva, Verdana, sans-serif;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 50%, rgba(255, 107, 107, 0.1), transparent),
                radial-gradient(circle at 80% 80%, rgba(78, 205, 196, 0.1), transparent),
                radial-gradient(circle at 40% 100%, rgba(139, 46, 143, 0.1), transparent);
    pointer-events: none;
    animation: float 6s ease-in-out infinite;
}

form{
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    position: absolute;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border: none solid rgba(255, 255, 255, 0.2);
    padding: 70px;
    border-radius: 20px;
    width: 300px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    z-index: 10;
}
input {
display: block;
margin: auto;
width: 80%;
padding: 5px;
border-radius: 30px;
border: 2px solid rgba(255, 255, 255, 0.3);
outline: none;
font-size: 12px;
background-color: rgba(255, 255, 255, 0.9);
color: #333;
transition: all 0.3s ease;
margin-bottom: 10px;
}

input:not([type="radio"]):not([type="submit"]):hover {
    border-color: rgba(78, 205, 196, 0.8);
    box-shadow: 0 0 15px rgba(78, 205, 196, 0.5);
    transform: scale(1.05);
    background-color: white;
}

input:not([type="radio"]):not([type="submit"]):focus {
    border-color: rgba(78, 205, 196, 1);
    box-shadow: 0 0 20px rgba(78, 205, 196, 0.7);
    transform: scale(1.05);
}
h1{
text-align: center;
font-family: 'Segoe UI', Tahoma, geneva, Verdana, sans-serif;
}
input[type="submit"] {
background-color: #22c55e;
color: white;
font-size: 10px;
cursor: pointer;
transition: background-color 0.5s;
}
input[type="submit"]:hover {
background-color: #16a34a;
}
a{
display: block;
text-align: center;
color: #22c55e;
text-decoration: none;
}
input[type="radio"] {
margin: none;
}

    </style>
</head>
<body>
    <img src="carrinho.png" alt="carrinho" style="display: block; width: 80px; height: 70px;"><br>
    <form onsubmit="cadastrar(); return false;">
         <h1>Cadastro</h1>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br>
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" required>
        <br>
        <label for="Confirme a senha">Confirme a Senha:</label>
        <input type="password" id="Confirme a senha" name="Confirme a senha" required>
        <br>
        <label for="data-de-nascimento">Data de Nascimento:</label>
        <input type="date" id="data-de-nascimento" name="data-de-nascimento" required>
        <br>
        <label>Sexo:</label>
        <br>
        <input type="radio" id="masculino" name="sexo" value="masculino" required>
        <label for="masculino">Masculino</label>
        <br>
        <input type="radio" id="feminino" name="sexo" value="feminino" required>
        <label for="feminino">Feminino</label>
        <br><br>
        <input type="submit" value="Cadastrar">
        <br>
        <a href="index.html" style="color: #2522c5; text-decoration: none;">Já tem uma conta? Faça login</a>
    </form>
     <script src="script.js"></script>
</body>
</html>
